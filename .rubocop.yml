# Merge our Exclude lists with RuboCop's defaults (vendor/**/*, tmp/**/*, …)
# instead of replacing them — CI vendors gems into vendor/bundle, which
# RuboCop must keep skipping.
inherit_mode:
  merge:
    - Exclude

AllCops:
  TargetRubyVersion: 3.0
  Exclude:
    # gitignored local planning notes and scratch tooling (see CLAUDE.md)
    - docs/**/*

Style/Documentation:
  Enabled: false

Metrics/ClassLength:
  Exclude:
    - lib/json/repairer.rb

Metrics/AbcSize:
  Exclude:
    - lib/json/repairer.rb

Metrics/MethodLength:
  Exclude:
    - lib/json/repairer.rb
    - benchmark/**/*

Metrics/CyclomaticComplexity:
  Exclude:
    - lib/json/repairer.rb

Metrics/PerceivedComplexity:
  Exclude:
    - lib/json/repairer.rb

Metrics/BlockLength:
  Exclude:
    - lib/json/repairer.rb
    - spec/**/*
    # restore RuboCop's default exclusion, lost when Exclude is overridden
    - '*.gemspec'

Metrics/BlockNesting:
  Exclude:
    - lib/json/repairer.rb

Metrics/ModuleLength:
  Exclude:
    - lib/json/repair/string_utils.rb